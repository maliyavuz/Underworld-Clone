kind = "web"
previewPath = "/"
title = "Underworld"
version = "1.0.0"
id = "artifacts/underworld"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19929

[services.development]
run = "pnpm --filter @workspace/underworld run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/underworld", "run", "build" ]
publicDir = "artifacts/underworld/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19929"
BASE_PATH = "/"
