openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Underworld game API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: player
  - name: crimes
  - name: carTheft
  - name: heist
  - name: travel
  - name: activity
  - name: reward
  - name: garage
  - name: rankings
  - name: properties
  - name: market
  - name: messages
  - name: groupCrimes
  - name: jail
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /player/me:
    get:
      operationId: getPlayer
      tags: [player]
      summary: Get current player
      responses:
        "200":
          description: Player profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"

  /reward/daily:
    get:
      operationId: getDailyReward
      tags: [reward]
      summary: Get daily reward status
      responses:
        "200":
          description: Daily reward info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyReward"
    post:
      operationId: claimDailyReward
      tags: [reward]
      summary: Claim daily reward
      responses:
        "200":
          description: Reward claimed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyRewardResult"

  /crimes:
    get:
      operationId: getCrimes
      tags: [crimes]
      summary: List available crimes
      responses:
        "200":
          description: List of crimes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Crime"

  /crimes/{crimeId}/commit:
    post:
      operationId: commitCrime
      tags: [crimes]
      summary: Commit a crime
      parameters:
        - name: crimeId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Crime result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrimeResult"

  /car-theft/available:
    get:
      operationId: getAvailableCars
      tags: [carTheft]
      summary: Get cars available to steal
      responses:
        "200":
          description: List of cars
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CarTarget"

  /car-theft/steal:
    post:
      operationId: stealCar
      tags: [carTheft]
      summary: Steal a car
      responses:
        "200":
          description: Theft result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CarTheftResult"

  /heist/plans:
    get:
      operationId: getHeistPlans
      tags: [heist]
      summary: Get available heist plans
      responses:
        "200":
          description: Heist plans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HeistPlan"

  /heist/execute:
    post:
      operationId: executeHeist
      tags: [heist]
      summary: Execute a heist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HeistInput"
      responses:
        "200":
          description: Heist result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HeistResult"

  /travel/cities:
    get:
      operationId: getCities
      tags: [travel]
      summary: Get cities to travel to
      responses:
        "200":
          description: Cities list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/City"

  /travel/go:
    post:
      operationId: travelToCity
      tags: [travel]
      summary: Travel to a city
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TravelInput"
      responses:
        "200":
          description: Travel result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TravelResult"

  /activity/feed:
    get:
      operationId: getActivityFeed
      tags: [activity]
      summary: Get global activity feed
      responses:
        "200":
          description: Activity feed
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityEntry"

  /activity/recent:
    get:
      operationId: getRecentActivity
      tags: [activity]
      summary: Get recent player activity
      responses:
        "200":
          description: Recent activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RecentActivityEntry"

  /garage/vehicles:
    get:
      operationId: getGarageVehicles
      tags: [garage]
      summary: Get player vehicles
      responses:
        "200":
          description: Vehicles list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Vehicle"

  /rankings/top:
    get:
      operationId: getTopRankings
      tags: [rankings]
      summary: Get top rankings
      responses:
        "200":
          description: Rankings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RankingEntry"

  /properties:
    get:
      operationId: getProperties
      tags: [properties]
      summary: List all properties with ownership status
      responses:
        "200":
          description: Properties list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Property"

  /properties/{propertyId}/buy:
    post:
      operationId: buyProperty
      tags: [properties]
      summary: Purchase a property
      parameters:
        - name: propertyId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Purchase result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuyPropertyResult"

  /properties/{propertyId}/collect:
    post:
      operationId: collectPropertyIncome
      tags: [properties]
      summary: Collect pending income from a property
      parameters:
        - name: propertyId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Collection result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectPropertyResult"

  /market/items:
    get:
      operationId: getMarketItems
      tags: [market]
      summary: List black market items
      responses:
        "200":
          description: Market items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MarketItem"

  /market/buy/{itemId}:
    post:
      operationId: buyMarketItem
      tags: [market]
      summary: Buy a black market item
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Purchase result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuyItemResult"

  /messages/inbox:
    get:
      operationId: getInbox
      tags: [messages]
      summary: Get player inbox messages
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"

  /messages/send:
    post:
      operationId: sendMessage
      tags: [messages]
      summary: Send a message to another player
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageInput"
      responses:
        "200":
          description: Send result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendMessageResult"

  /messages/{messageId}/read:
    post:
      operationId: markMessageRead
      tags: [messages]
      summary: Mark a message as read
      parameters:
        - name: messageId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarkMessageReadResult"

  /group-crimes:
    get:
      operationId: getGroupCrimes
      tags: [groupCrimes]
      summary: List available group crimes
      responses:
        "200":
          description: Group crimes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GroupCrime"

  /group-crimes/{crimeId}/commit:
    post:
      operationId: commitGroupCrime
      tags: [groupCrimes]
      summary: Commit a group crime
      parameters:
        - name: crimeId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommitGroupCrimeResult"

  /jail:
    get:
      operationId: getJailStatus
      tags: [jail]
      summary: Get current jail status
      responses:
        "200":
          description: Jail status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JailStatus"

  /jail/bail:
    post:
      operationId: payBail
      tags: [jail]
      summary: Pay bail to get out of jail immediately
      responses:
        "200":
          description: Bail result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JailBailResult"

  /jail/bust:
    post:
      operationId: bustFromJail
      tags: [jail]
      summary: Spend nerve to reduce jail time
      responses:
        "200":
          description: Bust result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JailBustResult"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    Player:
      type: object
      required: [id, username, rank, rankProgress, hp, maxHp, energy, maxEnergy, nerve, maxNerve, cash, respect, streakDays, city, jailUntil, crimeCooldownUntil]
      properties:
        id:
          type: integer
        username:
          type: string
        rank:
          type: string
        rankProgress:
          type: integer
        hp:
          type: integer
        maxHp:
          type: integer
        energy:
          type: integer
        maxEnergy:
          type: integer
        nerve:
          type: integer
        maxNerve:
          type: integer
        cash:
          type: integer
        respect:
          type: integer
        streakDays:
          type: integer
        city:
          type: string
        jailUntil:
          type: ["string", "null"]
        crimeCooldownUntil:
          type: ["string", "null"]

    DailyReward:
      type: object
      required: [canClaim, nextClaimInSeconds, streakDays, rewardAmount]
      properties:
        canClaim:
          type: boolean
        nextClaimInSeconds:
          type: integer
        streakDays:
          type: integer
        rewardAmount:
          type: integer

    DailyRewardResult:
      type: object
      required: [success, amount, newStreakDays]
      properties:
        success:
          type: boolean
        amount:
          type: integer
        newStreakDays:
          type: integer

    Crime:
      type: object
      required: [id, name, description, cashReward, respReward, nerveCost, successRate, cooldownSeconds, jailChanceOnFail, hpLossOnFail, jailSeconds, bailCost]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        cashReward:
          type: integer
        respReward:
          type: integer
        nerveCost:
          type: integer
        successRate:
          type: integer
        cooldownSeconds:
          type: integer
        jailChanceOnFail:
          type: integer
        hpLossOnFail:
          type: integer
        jailSeconds:
          type: integer
        bailCost:
          type: integer

    CrimeResult:
      type: object
      required: [success, message, cashGained, respectGained, jailed, cooldownSeconds, hpLost]
      properties:
        success:
          type: boolean
        message:
          type: string
        cashGained:
          type: integer
        respectGained:
          type: integer
        jailed:
          type: boolean
        cooldownSeconds:
          type: integer
        hpLost:
          type: integer

    CarTarget:
      type: object
      required: [id, make, model, value, difficultyPct]
      properties:
        id:
          type: string
        make:
          type: string
        model:
          type: string
        value:
          type: integer
        difficultyPct:
          type: integer

    CarTheftResult:
      type: object
      required: [success, message, cashValue]
      properties:
        success:
          type: boolean
        message:
          type: string
        vehicle:
          type: ["string", "null"]
        cashValue:
          type: integer

    HeistPlan:
      type: object
      required: [id, name, description, reward, nerveCost, minPlayers]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        reward:
          type: integer
        nerveCost:
          type: integer
        minPlayers:
          type: integer

    HeistInput:
      type: object
      required: [planId]
      properties:
        planId:
          type: string

    HeistResult:
      type: object
      required: [success, message, cashGained, respectGained]
      properties:
        success:
          type: boolean
        message:
          type: string
        cashGained:
          type: integer
        respectGained:
          type: integer

    City:
      type: object
      required: [id, name, country, travelCost, unlockRank]
      properties:
        id:
          type: string
        name:
          type: string
        country:
          type: string
        travelCost:
          type: integer
        unlockRank:
          type: string

    TravelInput:
      type: object
      required: [cityId]
      properties:
        cityId:
          type: string

    TravelResult:
      type: object
      required: [success, message, newCity]
      properties:
        success:
          type: boolean
        message:
          type: string
        newCity:
          type: string

    ActivityEntry:
      type: object
      required: [id, username, action, detail, timeAgo, avatarColor]
      properties:
        id:
          type: integer
        username:
          type: string
        action:
          type: string
        detail:
          type: string
        timeAgo:
          type: string
        avatarColor:
          type: string

    RecentActivityEntry:
      type: object
      required: [id, description, amount, timeAgo, type]
      properties:
        id:
          type: integer
        description:
          type: string
        target:
          type: ["string", "null"]
        amount:
          type: integer
        timeAgo:
          type: string
        type:
          type: string

    Vehicle:
      type: object
      required: [id, make, model, year, value, condition]
      properties:
        id:
          type: integer
        make:
          type: string
        model:
          type: string
        year:
          type: integer
        value:
          type: integer
        condition:
          type: string

    RankingEntry:
      type: object
      required: [position, username, rank, respect, cash]
      properties:
        position:
          type: integer
        username:
          type: string
        rank:
          type: string
        respect:
          type: integer
        cash:
          type: integer

    Property:
      type: object
      required: [id, name, description, cost, incomePerHour, category, owned, pendingIncome, lastCollectedAt]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        cost:
          type: integer
        incomePerHour:
          type: integer
        category:
          type: string
        owned:
          type: boolean
        pendingIncome:
          type: integer
        lastCollectedAt:
          type: ["string", "null"]

    BuyPropertyResult:
      type: object
      required: [success, message]
      properties:
        success:
          type: boolean
        message:
          type: string

    CollectPropertyResult:
      type: object
      required: [success, amountCollected]
      properties:
        success:
          type: boolean
        amountCollected:
          type: integer

    MarketItem:
      type: object
      required: [id, name, description, price, type, effect, owned]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        price:
          type: integer
        type:
          type: string
        effect:
          type: string
        owned:
          type: boolean

    BuyItemResult:
      type: object
      required: [success, message]
      properties:
        success:
          type: boolean
        message:
          type: string

    Message:
      type: object
      required: [id, senderUsername, content, read, timeAgo]
      properties:
        id:
          type: integer
        senderUsername:
          type: string
        content:
          type: string
        read:
          type: boolean
        timeAgo:
          type: string

    SendMessageInput:
      type: object
      required: [toUsername, content]
      properties:
        toUsername:
          type: string
        content:
          type: string

    SendMessageResult:
      type: object
      required: [success]
      properties:
        success:
          type: boolean

    MarkMessageReadResult:
      type: object
      required: [success]
      properties:
        success:
          type: boolean

    GroupCrime:
      type: object
      required: [id, name, description, cashReward, nerveCost, minMembers, successRate]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        cashReward:
          type: integer
        nerveCost:
          type: integer
        minMembers:
          type: integer
        successRate:
          type: integer

    CommitGroupCrimeResult:
      type: object
      required: [success, message, cashGained, respectGained]
      properties:
        success:
          type: boolean
        message:
          type: string
        cashGained:
          type: integer
        respectGained:
          type: integer

    JailStatus:
      type: object
      required: [inJail, secondsRemaining, bailAmount, jailUntil]
      properties:
        inJail:
          type: boolean
        secondsRemaining:
          type: integer
        bailAmount:
          type: integer
        jailUntil:
          type: ["string", "null"]

    JailBailResult:
      type: object
      required: [success, message]
      properties:
        success:
          type: boolean
        message:
          type: string

    JailBustResult:
      type: object
      required: [success, message, secondsReduced, secondsRemaining]
      properties:
        success:
          type: boolean
        message:
          type: string
        secondsReduced:
          type: integer
        secondsRemaining:
          type: integer
